<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WanderCraft - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0f16;
      --surface: #141d2a;
      --line: rgba(255, 255, 255, 0.1);
      --text: #eef3f9;
      --muted: #98a5b6;
      --accent: #5ee6c4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      color: var(--text);
      font-family: "DM Sans", system-ui, sans-serif;
      background:
        radial-gradient(circle at 15% 0%, rgba(94, 230, 196, 0.12), transparent 35%),
        radial-gradient(circle at 85% 10%, rgba(124, 156, 255, 0.14), transparent 35%),
        var(--bg);
    }

    .card {
      width: min(420px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 1.2rem 1.15rem;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
    }

    h1 {
      margin: 0;
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.45rem;
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 0.35rem 0 1rem;
      font-size: 0.9rem;
      color: var(--muted);
    }

    form {
      display: grid;
      gap: 0.75rem;
    }

    label {
      display: grid;
      gap: 0.35rem;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 0.75rem 0.8rem;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #1a2535;
      color: var(--text);
      font: inherit;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(94, 230, 196, 0.16);
    }

    button {
      margin-top: 0.3rem;
      padding: 0.8rem 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font: inherit;
      font-weight: 600;
      color: #071210;
      background: linear-gradient(135deg, var(--accent), #44c9a9);
    }
  </style>
</head>
<body>
  <section class="card" aria-labelledby="login-title">
    <h1 id="login-title">Login</h1>
    <p class="sub">Enter your details to continue to your travel dashboard.</p>

    <form id="login-form">
      <label>
        Name
        <input type="text" name="name" required autocomplete="name" />
      </label>
      <label>
        Phone Number
        <input type="tel" name="phone" required autocomplete="tel" />
      </label>
      <label>
        Email
        <input type="email" name="email" required autocomplete="email" />
      </label>
      <button type="submit">Continue</button>
    </form>
  </section>

  <script>
    (function () {
      "use strict";
      var form = document.getElementById("login-form");
      form.addEventListener("submit", function (event) {
        event.preventDefault();
        window.location.href = "index.html";
      });
    })();
  </script>
</body>
</html>
